name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage